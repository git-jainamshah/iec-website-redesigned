<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 380" width="420" height="380">
  <!-- Red/orange geometric square -->
  <rect x="60" y="10" width="300" height="280" rx="4" fill="#cc0000"/>
  <!-- Geometric triangles inside - inspired by the AB logo pattern -->
  <!-- Left triangle (red-orange) -->
  <polygon points="60,10 210,10 60,140" fill="#cc2200" opacity="0.8"/>
  <!-- Center top triangle (dark red) -->
  <polygon points="60,10 360,10 210,140" fill="#990000"/>
  <!-- Right triangle -->
  <polygon points="210,10 360,10 360,140" fill="#cc2200" opacity="0.8"/>
  <!-- Bottom section triangles -->
  <polygon points="60,140 210,140 60,290" fill="#dd4400" opacity="0.7"/>
  <polygon points="60,140 360,290 210,140" fill="#ff6600" opacity="0.5"/>
  <polygon points="210,140 360,140 360,290" fill="#dd2200" opacity="0.7"/>
  <!-- Yellow/gold triangles -->
  <polygon points="130,75 280,75 210,140" fill="#cc8800" opacity="0.6"/>
  <polygon points="100,170 210,140 150,240" fill="#cc6600" opacity="0.5"/>
  <!-- Shine lines -->
  <polygon points="175,10 210,10 145,75 125,45" fill="white" opacity="0.15"/>
  <polygon points="210,10 260,10 290,60 210,75" fill="white" opacity="0.1"/>
  <!-- Text -->
  <text x="210" y="328" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#990000" text-anchor="middle" letter-spacing="4">ADITYA BIRLA</text>
  <text x="210" y="360" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#990000" text-anchor="middle" letter-spacing="6">GROUP</text>
</svg>
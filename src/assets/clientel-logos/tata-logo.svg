<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Tata oval -->
  <ellipse cx="100" cy="80" rx="90" ry="72" fill="#4a6baf"/>
  <!-- White T shape -->
  <rect x="62" y="28" width="76" height="18" fill="white"/>
  <rect x="88" y="46" width="24" height="70" fill="white"/>
  <!-- Gap cuts in oval -->
  <rect x="10" y="68" width="28" height="24" fill="#4a6baf"/>
  <rect x="162" y="68" width="28" height="24" fill="#4a6baf"/>
  <!-- TATA text -->
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#4a6baf" text-anchor="middle" letter-spacing="4">TATA</text>
</svg>
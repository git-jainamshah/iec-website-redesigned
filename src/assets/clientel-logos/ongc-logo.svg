<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" width="300" height="320">
  <!-- Red background square -->
  <rect x="0" y="0" width="300" height="240" fill="#b22222" rx="4"/>
  <!-- Drilling tower icon in white -->
  <!-- Tower base -->
  <polygon points="90,210 100,80 150,50 200,80 210,210" fill="none" stroke="white" stroke-width="6"/>
  <!-- Cross beams -->
  <line x1="103" y1="150" x2="197" y2="150" stroke="white" stroke-width="5"/>
  <line x1="108" y1="120" x2="192" y2="120" stroke="white" stroke-width="5"/>
  <line x1="113" y1="90" x2="187" y2="90" stroke="white" stroke-width="5"/>
  <!-- Derrick top -->
  <line x1="150" y1="50" x2="150" y2="25" stroke="white" stroke-width="6"/>
  <polygon points="140,30 150,10 160,30" fill="white"/>
  <!-- Arc waves -->
  <path d="M100,195 Q120,180 140,195 Q160,210 180,195 Q200,180 210,195" stroke="white" stroke-width="4" fill="none"/>
  <path d="M95,210 Q120,195 140,210 Q160,225 185,210" stroke="white" stroke-width="3" fill="none" opacity="0.6"/>
  <!-- ONGC text -->
  <text x="150" y="290" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="#b22222" text-anchor="middle" letter-spacing="3">ONGC</text>
  <text x="150" y="315" font-family="Arial, sans-serif" font-size="12" fill="#555" text-anchor="middle">Oil and Natural Gas Corporation</text>
</svg>